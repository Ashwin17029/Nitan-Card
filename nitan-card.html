<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nitan Kumar — Elite Bookkeepers & Associates</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,600;1,500&family=Jost:wght@300;400;500;600&display=swap');

  :root{
    --maroon:#6e1423;
    --maroon-deep:#4a0d18;
    --gold:#c9a24b;
    --gold-soft:#e9d9ad;
    --cream:#f7f3ea;
    --ink:#2b2320;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{
    font-family:'Jost',sans-serif;
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    padding:28px 16px;
    background:
      radial-gradient(circle at 20% 15%, #5a1020 0%, transparent 55%),
      radial-gradient(circle at 85% 90%, #3a0a14 0%, transparent 55%),
      #2c0810;
    color:var(--ink);
  }
  .card{
    width:100%;max-width:420px;
    background:linear-gradient(160deg,#fffdf8 0%, var(--cream) 100%);
    border-radius:22px;
    box-shadow:0 30px 70px -20px rgba(0,0,0,.6);
    overflow:hidden;
    position:relative;
    animation:rise .8s cubic-bezier(.2,.8,.2,1) both;
  }
  @keyframes rise{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
  .card::before{
    content:"";position:absolute;inset:9px;
    border:1px solid var(--gold);border-radius:15px;
    pointer-events:none;opacity:.5;
  }

  .header{
    background:linear-gradient(135deg,var(--maroon) 0%, var(--maroon-deep) 100%);
    color:var(--cream);
    padding:40px 32px 30px;
    position:relative;
    text-align:center;
  }
  .header::after{
    content:"";position:absolute;left:0;right:0;bottom:0;height:3px;
    background:linear-gradient(90deg,transparent,var(--gold),transparent);
  }
  .monogram{
    width:62px;height:62px;margin:0 auto 16px;
    border:2px solid var(--gold);border-radius:50%;
    display:flex;align-items:center;justify-content:center;
    font-family:'Cormorant Garamond',serif;font-weight:600;font-size:21px;
    letter-spacing:0.5px;color:var(--gold-soft);
    background:rgba(0,0,0,.12);
  }
  .firm{
    font-family:'Cormorant Garamond',serif;
    font-size:27px;font-weight:600;letter-spacing:.5px;line-height:1.15;
    color:#fff;
  }
  .firm span{color:var(--gold-soft)}
  .tagline{
    margin-top:9px;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;
    color:var(--gold-soft);font-weight:400;
  }

  .body{padding:30px 32px 26px;text-align:center}
  .name{
    font-family:'Cormorant Garamond',serif;font-style:italic;
    font-size:32px;font-weight:600;color:var(--maroon);line-height:1;
  }
  .role{
    margin-top:6px;font-size:12px;letter-spacing:3px;text-transform:uppercase;
    color:var(--gold);font-weight:500;
  }
  .divider{
    width:46px;height:1px;background:var(--gold);margin:20px auto;
  }

  .contacts{display:flex;flex-direction:column;gap:2px;text-align:left}
  .row{
    display:flex;align-items:center;gap:14px;
    padding:11px 6px;border-bottom:1px solid rgba(110,20,35,.08);
    text-decoration:none;color:var(--ink);
    transition:background .2s,transform .2s;
  }
  .row:last-child{border-bottom:none}
  .row:hover{background:rgba(201,162,75,.1);transform:translateX(3px)}
  .ic{
    flex:0 0 34px;height:34px;border-radius:9px;
    background:var(--maroon);color:var(--gold-soft);
    display:flex;align-items:center;justify-content:center;
  }
  .ic svg{width:17px;height:17px;stroke:currentColor;fill:none;stroke-width:1.8}
  .rt{display:flex;flex-direction:column;line-height:1.3}
  .rl{font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--gold)}
  .rv{font-size:14.5px;font-weight:400;color:var(--ink)}

  .qr-wrap{
    margin:4px 32px 22px;padding:22px;
    background:rgba(110,20,35,.04);
    border:1px solid rgba(201,162,75,.4);
    border-radius:14px;text-align:center;
  }
  .qr-box{
    width:148px;height:148px;margin:0 auto 12px;
    background:#fff;border-radius:10px;padding:10px;
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 6px 16px -8px rgba(0,0,0,.3);
  }
  .qr-box canvas, .qr-box img{width:100%;height:100%}
  .qr-label{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--gold)}

  .actions{padding:0 32px 30px}
  .save{
    display:block;width:100%;text-align:center;
    padding:15px;border:none;cursor:pointer;
    background:linear-gradient(135deg,var(--maroon),var(--maroon-deep));
    color:var(--cream);font-family:'Jost',sans-serif;
    font-size:12px;letter-spacing:2.5px;text-transform:uppercase;font-weight:500;
    border-radius:11px;transition:transform .2s,box-shadow .2s;
    box-shadow:0 8px 20px -8px var(--maroon);
  }
  .save:hover{transform:translateY(-2px);box-shadow:0 12px 26px -8px var(--maroon)}
  .save:active{transform:translateY(0)}
</style>
</head>
<body>
  <div class="card">
    <div class="header">

      <div class="tagline">Business Consultants · Tax Agent · Chartered Accountant</div>

    <div class="body">

      <div class="contacts">

          <span class="rt"><span class="rl">Phone</span><span class="rv">(679) 310 0146</span></span>

        <a class="row" href="mailto:nitan@eba.com.fj">
          <span class="ic"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-10 7L2 7"/></svg></span>

          <span class="rt"><span class="rl">Office</span><span class="rv">44–46 High Street, Toorak, Suva</span></span>

        <div class="row" style="cursor:default">

        </div>
      </div>
    </div>

    <div class="qr-wrap">
      <div class="qr-box"><canvas id="qr"></canvas></div>
      <div class="qr-label">Scan to open this card</div>
    </div>

    <div class="actions">
      <button class="save" onclick="saveContact()">＋ Save to Contacts</button>
    </div>
  </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
/* ▼▼▼ PASTE YOUR PUBLIC CARD LINK HERE ▼▼▼ */
const CARD_URL = "https://Ashwin17029.github.io/Ashwin-Card/nitan.html";
/* ▲▲▲ then re-open this file — the QR updates automatically ▲▲▲ */

(function(){
  const holder = document.createElement("div");
  new QRCode(holder, {
    text: CARD_URL,
    width: 256, height: 256,
    colorDark: "#6e1423",
    colorLight: "#ffffff",
    correctLevel: QRCode.CorrectLevel.M
  });
  const box = document.querySelector(".qr-box");
  box.innerHTML = "";
  const out = holder.querySelector("img") || holder.querySelector("canvas");
  if(out) box.appendChild(out);
})();

function saveContact(){
  const vcf = [
    "BEGIN:VCARD","VERSION:3.0",
    "N:Kumar;Nitan;;;",
    "FN:Nitan Kumar",
    "ORG:Elite Bookkeepers & Associates",
    "TITLE:Partner",
    "TEL;TYPE=CELL:+6799263275",
    "TEL;TYPE=WORK,VOICE:+6793100146",
    "TEL;TYPE=FAX:+6793100156",
    "EMAIL;TYPE=WORK:nitan@eba.com.fj",
    "ADR;TYPE=WORK:;;44-46 High Street Toorak;Suva;;;Fiji",
    "ADR;TYPE=POSTAL:;;P.O. Box 17029;Suva;;;Fiji",
    "END:VCARD"
  ].join("\n");
  const blob = new Blob([vcf],{type:"text/vcard"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "Nitan_Kumar.vcf";
  a.click();
}
</script>
</body>
</html>
